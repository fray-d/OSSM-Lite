name: Branch Firmware Deploy

on:
  push:
    branches:
      - min-max-stroke
  workflow_dispatch:

jobs:
  check_changes:
    runs-on: ubuntu-latest
    outputs:
      changes_detected: ${{ steps.check_changes.outputs.changes_detected }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for changes in Software directory
        id: check_changes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual trigger — building unconditionally"
            echo "changes_detected=true" >> $GITHUB_OUTPUT
          elif git diff --name-only HEAD~1 HEAD | grep -q "^Software/"; then
            echo "Changes detected in Software directory"
            echo "changes_detected=true" >> $GITHUB_OUTPUT
          else
            echo "No changes in Software directory, skipping build"
            echo "changes_detected=false" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check_changes
    if: needs.check_changes.outputs.changes_detected == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio

      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install PlatformIO Core
        run: pip install --upgrade platformio

      - name: Build PlatformIO Project
        run: |
          cd Software
          pio run -e production

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-bin
          path: |
            Software/.pio/build/production/firmware.bin
            Software/.pio/build/production/partitions.bin
            Software/.pio/build/production/bootloader.bin
          retention-days: 7

  release:
    needs: [check_changes, build]
    if: needs.check_changes.outputs.changes_detected == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Download firmware artifact
        uses: actions/download-artifact@v4
        with:
          name: firmware-bin
          path: ./firmware

      - name: Generate manifest.json
        run: |
          REPO_URL="${{ github.server_url }}/${{ github.repository }}"
          TAG="min-max-stroke-latest"
          cat > ./firmware/manifest.json <<EOF
          {
            "name": "OSSM (min-max-stroke)",
            "builds": [
              {
                "chipFamily": "ESP32",
                "improv": false,
                "parts": [
                  {
                    "path": "${REPO_URL}/releases/download/${TAG}/bootloader.bin",
                    "offset": 4096
                  },
                  {
                    "path": "${REPO_URL}/releases/download/${TAG}/partitions.bin",
                    "offset": 32768
                  },
                  {
                    "path": "https://acjajruwevyyatztbkdf.supabase.co/storage/v1/object/public/ossm-firmware/boot_app0.bin",
                    "offset": 57344
                  },
                  {
                    "path": "${REPO_URL}/releases/download/${TAG}/firmware.bin",
                    "offset": 65536
                  }
                ]
              }
            ]
          }
          EOF

      - name: Delete existing release if present
        run: gh release delete min-max-stroke-latest --yes || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        run: |
          gh release create min-max-stroke-latest \
            --title "min-max-stroke (latest)" \
            --notes "Latest firmware build from the \`min-max-stroke\` branch. Flash via: ${{ github.server_url }}/${{ github.repository }}/blob/min-max-stroke/docs/index.html" \
            --prerelease \
            ./firmware/firmware.bin \
            ./firmware/partitions.bin \
            ./firmware/bootloader.bin \
            ./firmware/manifest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Deployment
        id: create_deployment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.ref,
              environment: 'firmware',
              auto_merge: false,
              required_contexts: [],
              description: 'OSSM Firmware Deployment'
            });
            return { id: deployment.data.id };

      - name: Create Deployment Status
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const deploymentId = ${{ steps.create_deployment.outputs.result }}.id;
            const flashUrl = '${{ github.server_url }}/${{ github.repository }}/blob/min-max-stroke/docs/index.html';
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deploymentId,
              state: 'success',
              environment_url: flashUrl,
              log_url: flashUrl,
              description: 'Firmware ready to flash'
            });
