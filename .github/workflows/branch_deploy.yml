name: Branch Firmware Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'Software/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio

      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install PlatformIO Core
        run: pip install --upgrade platformio

      - name: Build PlatformIO Project
        run: |
          cd Software
          pio run -e production

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-bin
          path: |
            Software/.pio/build/production/firmware.bin
            Software/.pio/build/production/partitions.bin
            Software/.pio/build/production/bootloader.bin
          retention-days: 7

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Download firmware artifact
        uses: actions/download-artifact@v4
        with:
          name: firmware-bin
          path: ./firmware

      - name: Copy firmware into docs/
        run: |
          cp ./firmware/firmware.bin docs/firmware.bin
          cp ./firmware/partitions.bin docs/partitions.bin
          cp ./firmware/bootloader.bin docs/bootloader.bin

      - name: Commit and push firmware to docs/
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/firmware.bin docs/partitions.bin docs/bootloader.bin
          git commit -m "Update firmware binaries [skip ci]" || echo "No changes to commit"
          git push

      - name: Create GitHub Deployment
        id: create_deployment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.ref,
              environment: 'firmware',
              auto_merge: false,
              required_contexts: [],
              description: 'OSSM Firmware Deployment'
            });
            return { id: deployment.data.id };

      - name: Create Deployment Status
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const deploymentId = ${{ steps.create_deployment.outputs.result }}.id;
            const flashUrl = 'https://fray-d.github.io/OSSM-Lite/';
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deploymentId,
              state: 'success',
              environment_url: flashUrl,
              log_url: flashUrl,
              description: 'Firmware ready to flash'
            });
