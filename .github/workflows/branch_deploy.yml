name: Branch Firmware Deploy

on:
  push:
    branches:
      - min-max-stroke
    paths:
      - 'Software/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio

      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install PlatformIO Core
        run: pip install --upgrade platformio

      - name: Build PlatformIO Project
        run: |
          cd Software
          pio run -e production

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-bin
          path: |
            Software/.pio/build/production/firmware.bin
            Software/.pio/build/production/partitions.bin
            Software/.pio/build/production/bootloader.bin
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Download firmware artifact
        uses: actions/download-artifact@v4
        with:
          name: firmware-bin
          path: ./firmware

      - name: Delete existing release if present
        run: gh release delete min-max-stroke-latest --yes || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        run: |
          gh release create min-max-stroke-latest \
            --title "min-max-stroke (latest)" \
            --notes "Latest firmware build from the \`min-max-stroke\` branch. Flash via: ${{ github.server_url }}/${{ github.repository }}/blob/min-max-stroke/docs/index.html" \
            --prerelease \
            ./firmware/firmware.bin \
            ./firmware/partitions.bin \
            ./firmware/bootloader.bin
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Deployment
        id: create_deployment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.ref,
              environment: 'firmware',
              auto_merge: false,
              required_contexts: [],
              description: 'OSSM Firmware Deployment'
            });
            return { id: deployment.data.id };

      - name: Create Deployment Status
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const deploymentId = ${{ steps.create_deployment.outputs.result }}.id;
            const flashUrl = '${{ github.server_url }}/${{ github.repository }}/blob/min-max-stroke/docs/index.html';
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deploymentId,
              state: 'success',
              environment_url: flashUrl,
              log_url: flashUrl,
              description: 'Firmware ready to flash'
            });
